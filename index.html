<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlavorVerse</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- navbar -->
    <nav class="navbar">
        <input type="checkbox" id="active-sidebar">
        <label for="active-sidebar" class="open-sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px" fill="#000000">
                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
            </svg>
        </label>
        <label for="active-sidebar" id="overlay"></label>
        <div class="links-container">
            <label for="active-sidebar" class="close-sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    fill="#000000">
                    <path
                        d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                </svg>
            </label>

            <span class="logo">FlavorVersa</span>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#menu">Menu</a>
            <a href="#contact">Contact</a>
        </div>


    </nav>
    <!-- Hero-sectiom -->
    <header id="home">

        <section class="hero-section">
            <h1 class="hero-text">Every Bite <span class="hero-second-text">Becomes a Memory</span></h1>
            <p class="hero-para para-1"><i>Powered by Flavor. Fueled by Vibes</i> </p>
            <p class="hero-para">Discover handcrafted meals made with fresh ingredients and unforgettable flavors. Every
                bite is a journey.</p>
            <div class="btn-container">
                <button class="btn btn-primary">Explore Menu</button>
                <button class="btn btn-secondary">Order Now</button>
            </div>
            <div class="grid-container">
                <div class="grid-item">
                    <p>4.9 ⭐</p>
                    <p>Rating</p>
                </div>
                <div class="grid-item">
                    <p>10K+😊</p>
                    <p>Happy Customers</p>
                </div>
                <div class="grid-item">
                    <p>100+🍥</p>
                    <p>Dishes</p>
                </div>
                <div class="grid-item">
                    <p>🚚 Fast</p>
                    <p>Delivery</p>
                </div>
            </div>
        </section>

    </header>


</body>

</html>
